        <style>
            :root {
                --bg: #f5f5f7;
                --text: #121212;
                --maxw: 420px;
                --phone-bg: #000000;
                --phone-shadow:
                    0 20px 60px rgba(0, 0, 0, 0.3),
                    0 8px 16px rgba(0, 0, 0, 0.2);
                --link-bg: rgba(255, 255, 255, 0.08);
                --link-border: rgba(255, 255, 255, 0.15);
                --link-hover-bg: rgba(255, 255, 255, 0.12);
                --link-hover-border: rgba(255, 255, 255, 0.3);
                --link-text: #ffffff;
                --footer-text: rgba(255, 255, 255, 0.5);
                --footer-link: rgba(255, 255, 255, 0.9);
            }

            @media (min-width: 769px) {
                :root {
                    --maxw: 800px;
                }
            }

            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: var(--bg);
                color: var(--text);
                font-family:
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    Helvetica,
                    Arial,
                    "Apple Color Emoji",
                    "Segoe UI Emoji";
            }

            .phone {
                width: min(92vw, var(--maxw));
                border-radius: 36px;
                background: var(--phone-bg);
                box-shadow: var(--phone-shadow);
                padding: 28px 18px 18px;
                position: relative;
                overflow: hidden;
                transition:
                    background 0.3s ease,
                    box-shadow 0.3s ease;
            }

            .profile {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding-bottom: 18px;
                text-align: center;
                position: relative;
            }

            .avatar-wrapper {
                width: calc(100% + 36px);
                height: clamp(350px, 90vw, 650px);
                margin: -28px -18px 0;
                position: relative;
                overflow: hidden;
                border-radius: 0 0 32px 32px;
            }

            .avatar-wrapper::after {
                content: "";
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: clamp(180px, 35vw, 270px);
                background: linear-gradient(
                    to bottom,
                    transparent 0%,
                    rgba(0, 0, 0, 0.3) 40%,
                    rgba(0, 0, 0, 0.7) 70%,
                    rgba(0, 0, 0, 0.95) 100%
                );
                pointer-events: none;
                z-index: 1;
                transition: background 0.3s ease;
            }

            .avatar {
                width: 100%;
                height: 100%;
                border-radius: 0;
                object-fit: cover;
                background: #e9e9ee;
                box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
                display: block;
            }

            h1 {
                position: absolute;
                bottom: 24px;
                left: 0;
                right: 0;
                margin: 0;
                padding: 12px 20px;
                font-size: 42px;
                line-height: 1.05;
                letter-spacing: -0.02em;
                color: #ffffff;
                text-shadow: 0 3px 12px rgba(0, 0, 0, 0.7);
                z-index: 2;
                transition:
                    color 0.3s ease,
                    text-shadow 0.3s ease;
            }

            .subtitle {
                margin: 18px 0 0;
                font-size: 15px;
                font-weight: 500;
                color: rgba(255, 255, 255, 0.7);
                letter-spacing: 0.02em;
            }

            .links {
                margin-top: 28px;
                margin-bottom: 32px;
                display: flex;
                flex-direction: column;
                gap: 16px;
                padding: 0 10px;
            }

            .linkBtn {
                appearance: none;
                border: 1px solid var(--link-border);
                width: 100%;
                padding: 20px 24px;
                border-radius: 16px;
                background: var(--link-bg);
                backdrop-filter: blur(10px);
                color: var(--link-text);
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                transition:
                    transform 0.15s ease,
                    background 0.15s ease,
                    border-color 0.15s ease,
                    color 0.3s ease;
                text-decoration: none;
                -webkit-tap-highlight-color: transparent;
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                user-select: none;
            }

            @media (hover: hover) and (pointer: fine) {
                .linkBtn:hover {
                    transform: translateY(-2px);
                    background: var(--link-hover-bg);
                    border-color: var(--link-hover-border);
                    box-shadow: 0 8px 20px rgba(255, 255, 255, 0.15);
                }
            }
            .linkBtn:active {
                transform: translateY(0px) scale(0.99);
            }

            .linkBtn:focus {
                outline: none;
            }

            .linkBtn:focus-visible {
                outline: 3px solid rgba(255, 255, 255, 0.6);
                outline-offset: 2px;
            }

            footer {
                display: flex;
                justify-content: center;
                margin: 18px 0 8px;
                padding: 0 10px;
            }

            footer {
                text-align: center;
                font-size: 11px;
                color: var(--footer-text);
                padding: 24px 0 8px;
                transition: color 0.3s ease;
            }

            footer a {
                color: var(--footer-link);
                text-decoration: none;
                font-weight: 600;
                transition: color 0.3s ease;
            }
            footer a:hover {
                text-decoration: underline;
            }

            @media (min-width: 769px) {
                body {
                    padding: 2.5vh 20px;
                    min-height: 100vh;
                }

                .phone {
                    border-radius: 24px;
                    padding: 0;
                    width: 420px;
                }

                .avatar-wrapper {
                    width: 100%;
                    aspect-ratio: 1 / 1;
                    height: auto;
                    margin: 0;
                    border-radius: 24px 24px 0 0;
                }

                h1 {
                    font-size: 56px;
                    bottom: 32px;
                    padding: 12px 40px;
                }

                .subtitle {
                    margin-top: 24px;
                    font-size: 17px;
                }

                .links {
                    margin-top: 3vh;
                    margin-bottom: 2vh;
                    gap: 1.5vh;
                    padding: 0 40px;
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                }

                .linkBtn {
                    padding: 22px 28px;
                    font-size: 17px;
                    border-radius: 18px;
                }

                footer {
                    padding: 2vh 0 2vh;
                    font-size: 12px;
                }
            }

            @media (max-width: 768px) {
                body {
                    padding: 0;
                }
                .phone {
                    width: 100vw;
                    min-height: 100vh;
                    border-radius: 0;
                    box-shadow: none;
                }
                .avatar-wrapper {
                    border-radius: 0;
                }
                .avatar-wrapper::after {
                    box-shadow: none;
                }
                .avatar {
                    box-shadow: none;
                }
                h1 {
                    text-shadow: none;
                }
            }
        </style>
    </head>
